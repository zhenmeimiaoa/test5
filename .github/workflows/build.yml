name: Build APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Setup Android SDK
      uses: android-actions/setup-android@v2
      
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
      
    - name: Build with Gradle
      run: ./gradlew assembleDebug
      
    - name: Get timestamp
      id: timestamp
      run: echo "timestamp=$(date +'%Y%m%d_%H%M%S')" >> $GITHUB_OUTPUT
      
    - name: Rename APK with timestamp
      run: |
        TIMESTAMP=${{ steps.timestamp.outputs.timestamp }}
        mv app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/MedicalApp_${TIMESTAMP}.apk
        
    - name: Upload APK
      uses: actions/upload-artifact@v3
      with:
        name: MedicalApp_${{ steps.timestamp.outputs.timestamp }}
        path: app/build/outputs/apk/debug/MedicalApp_*.apk
